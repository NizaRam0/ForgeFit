name: forge_fit
description: "AI-powered fitness coach app for progressive overload tracking."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
    

  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.0
 
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true


 
flutter:
  uses-material-design: true
  assets:
    - .env
